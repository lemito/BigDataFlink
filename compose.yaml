services:
  postgres:
    container_name: db
    image: postgres:18.3-alpine
    environment:
      POSTGRES_DB: db
      POSTGRES_USER: meow
      POSTGRES_PASSWORD: UwU
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./source_data:/docker-entrypoint-initdb.d
    networks:
      - meowork

  broker:
    image: apache/kafka:4.2.0
    container_name: broker
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://localhost:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
    networks:
      - meowork

  flink-loader:
    image: alpine:3.21
    container_name: flink_loader
    volumes:
      - flink_libs:/libs
    command: >
      sh -c "apk add --no-cache wget &&
             wget -P /libs/ https://repo1.maven.org/maven2/org/apache/flink/flink-connector-jdbc/3.1.2-1.18/flink-connector-jdbc-3.1.2-1.18.jar &&
             wget -P /libs/ https://jdbc.postgresql.org/download/postgresql-42.7.2.jar &&
             wget -P /libs/ https://repo1.maven.org/maven2/org/apache/flink/flink-connector-kafka/3.0.1-1.18/flink-connector-kafka-3.0.1-1.18.jar"
    networks:
      - meowork

  jobmanager:
    image: flink:2.2.0-java17
    container_name: jobmanager
    ports:
      - "8081:8081"
    command: jobmanager
    volumes:
      - flink_libs:/opt/flink/lib
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
    depends_on:
      flink-loader:
        condition: service_completed_successfully
    networks:
      - meowork

  taskmanager:
    image: flink:2.2.0-java17
    container_name: taskmanager
    depends_on:
      - jobmanager
    command: taskmanager
    volumes:
      - flink_libs:/opt/flink/lib
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
        taskmanager.numberOfTaskSlots: 2
    networks:
      - meowork

  producer:
    build:
      context: ./producer_service
      dockerfile: Dockerfile
    container_name: producer
    depends_on:
      - broker
    environment:
      KAFKA_BOOTSTRAP_SERVERS: broker:9092
    networks:
      - meowork

networks:
  meowork:
    driver: bridge

volumes:
  postgres_data:
  flink_libs:
