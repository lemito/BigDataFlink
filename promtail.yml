server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: producer
    static_configs:
      - targets:
          - localhost
        labels:
          job: producer
          __path__: /logs/producer.log
    pipeline_stages:
      - json:
          expressions:
            level:          level
            text:           text
            timestamp:      timestamp
            module:         module
            component_name: component_name
            trace_id:       trace_id
            span_id:        span_id
            link:           link
      - labels:
          level:
          module:
          component_name:
          link:
      - timestamp:
          source: timestamp
          format: RFC3339Nano
